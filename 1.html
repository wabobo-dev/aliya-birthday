<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, Aliya</title>
  <style>
    :root {
      --bg1: #fff3f7;
      --bg2: #f7eeff;
      --accent: #ff8fa3;
      --accent-2: #8c7ae6;
      --accent-pink: #ff5d8f;
      --text: #4b3b5a;
      --soft: #fffdfd;
      --glass: rgba(255, 255, 255, 0.65);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #ffe9f0 0%, var(--bg1) 35%, var(--bg2) 100%);
      overflow-x: hidden;
      min-height: 100vh;
    }

    .aurora {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .aurora span {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.4;
      animation: drift 16s ease-in-out infinite alternate;
    }

    .aurora span:nth-child(1) { width: 240px; height: 240px; background: #ffd6e6; top: 8%; left: 10%; }
    .aurora span:nth-child(2) { width: 300px; height: 300px; background: #d7c7ff; bottom: 10%; right: 8%; animation-duration: 20s; }
    .aurora span:nth-child(3) { width: 200px; height: 200px; background: #fff0b3; top: 45%; left: 40%; animation-duration: 18s; }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 20px 50px rgba(120, 92, 172, 0.16);
      border-radius: 32px;
      padding: 28px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      align-items: center;
    }

    .hero-text h1 {
      font-size: clamp(2.2rem, 4vw, 3.3rem);
      line-height: 1.1;
      margin: 0 0 12px;
      letter-spacing: 0.02em;
    }

    .hero-text p {
      font-size: 1.05rem;
      line-height: 1.7;
      margin: 0 0 16px;
    }

    .highlight {
      color: var(--accent);
      font-weight: 700;
    }
    
    .heart {
      color: var(--accent-pink);
      font-size: 1.5rem;
      display: inline-block;
      margin-left: 6px;
      transform-origin: center;
      animation: heartbeat 1.3s ease-in-out infinite;
      text-shadow: 0 0 10px rgba(255, 93, 143, 0.18);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
      box-shadow: 0 8px 20px rgba(120,92,172,0.16);
    }

    button:hover { transform: translateY(-2px); }

    .primary { background: linear-gradient(135deg, var(--accent), #ff9f7a); color: white; }
    .secondary { background: white; color: var(--text); }

    .gift-box {
      background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(246,233,255,0.92));
      border-radius: 28px;
      padding: 20px;
      text-align: center;
      position: relative;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .gift-box::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 24px;
      border: 2px dashed rgba(140, 122, 230, 0.25);
      pointer-events: none;
    }

    .gift-face {
      font-size: clamp(2.8rem, 6vw, 4.8rem);
      animation: sway 3.2s ease-in-out infinite;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,0.12));
    }

    /* Media area inside the gift box */
    .media-wrap {
      width: 100%;
      height: 100%;
      max-height: 320px;
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(250,244,255,0.9));
    }

    .media-wrap .media {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .audio-toggle {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 4;
      background: linear-gradient(135deg, var(--accent), #ff9f7a);
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(120,92,172,0.12);
      display: none;
    }

    

    .message-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 22px;
    }

    .floating-emoji {
      position: fixed;
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      user-select: none;
      animation: floatFade 6s ease-out forwards;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.12));
    }

    .status {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #77627f;
    }

    @keyframes drift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to { transform: translate3d(20px, 25px, 0) scale(1.08); }
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-6deg) translateY(0); }
      50% { transform: rotate(6deg) translateY(-6px); }
    }

    @keyframes floatFade {
      0% { opacity: 0; transform: translateY(18px) scale(0.8); }
      12% { opacity: 0.9; }
      100% { opacity: 0; transform: translateY(-140px) scale(1.08); }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      20% { transform: scale(1.08); }
      40% { transform: scale(1); }
      60% { transform: scale(1.06); }
      80% { transform: scale(1); }
    }

    @media (max-width: 760px) {
      .hero { grid-template-columns: 1fr; }
      .message-grid { grid-template-columns: 1fr; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <main class="page">
    <section class="card">
      <div class="hero">
        <div class="hero-text">

          <h1>Happy Birthday, <span class="highlight">Aliya</span><div class="heart">💖</div></h1>
          <p>Today is all about your lovely smile, your bright spirit, and the kind of warmth that makes everything feel lighter and sweeter. I hope this little page brings you a touch of joy, calm, and a whole lot of birthday magic.</p>
          <div class="button-row">
            <button class="primary" id="musicBtn" style="display:none;">▶ Play gentle birthday tune</button>
          </div>
        </div>
        <audio id="aliyaAudio" src="aliya.mp3" preload="auto" loop></audio>

        <div class="gift-box" aria-label="celebration box">
          <div class="media-wrap" id="mediaWrap">
            <video id="aliyaVideo" class="media" playsinline autoplay loop preload="metadata" alt="your vid" style="display:none;" >
              <source src="aliya.mp4" type="video/mp4">
            </video>
          </div>
        </div>
      </div>

      <div class="message-grid">
        </article>
      </div>
    </section>
  </main>

  <script>
    let audioStarted = false;
    let audioContext;
  
    function playNote(freq, duration, time) {
      if (!audioContext) return;
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(freq, time);
      gainNode.gain.setValueAtTime(0.0001, time);
      gainNode.gain.exponentialRampToValueAtTime(0.022, time + 0.04);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, time + duration);
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.start(time);
      oscillator.stop(time + duration + 0.02);
    }
  
    function startAmbientSound() {
      if (audioStarted) return;
      audioStarted = true;
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [392, 440, 523, 587, 523, 440];
      const playLoop = () => {
        const now = audioContext.currentTime;
        notes.forEach((freq, index) => {
          playNote(freq, 0.45, now + index * 0.15);
        });
        setTimeout(playLoop, 1400);
      };
      audioContext.resume().then(playLoop);
    }
  
    function createFloatingEmoji() {
      const emojis = ['🎂', '🧁', '🌸', '✨', '💗', '🍰', '✨', '🍬'];
      const popup = document.createElement('div');
      popup.className = 'floating-emoji';
      popup.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      popup.style.left = `${Math.random() * 90 + 5}vw`;
      popup.style.top = `${Math.random() * 70 + 10}vh`;
      popup.style.fontSize = `${(1.1 + Math.random() * 0.8).toFixed(2)}rem`;
      popup.style.opacity = `${(0.16 + Math.random() * 0.2).toFixed(2)}`;
      document.body.appendChild(popup);
      setTimeout(() => popup.remove(), 6000);
    }
  
    function startGentleMagic() {
      createFloatingEmoji();
      setInterval(createFloatingEmoji, 1800);
    }
  
    // Smoothly fades in the target audio element
    function fadeInAudio(audioElement, targetVolume = 0.7, duration = 3000) {
      audioElement.volume = 0;
      const intervalTime = 50; 
      const step = targetVolume / (duration / intervalTime);
      
      const fadeInterval = setInterval(() => {
        if (audioElement.volume + step < targetVolume) {
          audioElement.volume += step;
        } else {
          audioElement.volume = targetVolume;
          clearInterval(fadeInterval);
        }
      }, intervalTime);
    }
  
    window.addEventListener('load', () => {
      setTimeout(startGentleMagic, 600);
  
      const video = document.getElementById('aliyaVideo');
      const audioEl = document.getElementById('aliyaAudio');
  
      if (video) {
        video.muted = true;
        video.style.display = 'block'; 
        video.play().catch(() => {
          video.style.display = 'block';
        });
      }
  
      // Function to trigger audio on the very first screen interaction
      function handleFirstInteraction() {
        if (audioStarted) return;
        
        if (audioEl) {
          audioEl.play().then(() => {
            audioStarted = true;
            fadeInAudio(audioEl, 0.7, 3000);
            cleanUpListeners();
          }).catch(() => {});
        }
      }
  
      function cleanUpListeners() {
        document.removeEventListener('click', handleFirstInteraction);
        document.removeEventListener('touchstart', handleFirstInteraction);
        document.removeEventListener('keydown', handleFirstInteraction);
      }
  
      // Attach global hidden listeners to catch the first tap/scroll/touch
      document.addEventListener('click', handleFirstInteraction, { once: true });
      document.addEventListener('touchstart', handleFirstInteraction, { once: true });
      document.addEventListener('keydown', handleFirstInteraction, { once: true });
  
      if (audioEl) {
        audioEl.volume = 0;
        
        // Attempt immediate browser autoplay check
        setTimeout(() => {
          audioEl.play().then(() => {
            audioStarted = true;
            fadeInAudio(audioEl, 0.7, 3000);
            cleanUpListeners();
          }).catch(() => {
            // If browser completely blocks it, it silently waits for her first tap on the screen
            if (!audioStarted) startAmbientSound();
          });
        }, 2000);
      } else {
        setTimeout(() => { if (!audioStarted) startAmbientSound(); }, 2600);
      }
    });
  </script>
</body>
</html>
